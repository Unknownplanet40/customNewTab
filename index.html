<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="assets/vendors/bootstrap/bootstrap.min.css" rel="stylesheet" />
  <!-- <link rel="icon" href="data:," /> -->
  <!-- <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>" /> -->
  <link rel="icon" href="assets/images/icons/icons-x192.png" />
  <link rel="stylesheet" href="assets/vendors/sweetalert2/sweetalert2.css" />
  <link rel="stylesheet" href="assets/vendors/sweetalert2/sweetalertBootstrap.css" />
  <link href="assets/fonts/family.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainStyle.css" />

  <script src="assets/vendors/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="assets/vendors/sweetalert2/sweetalert2.js"></script>
  <script src="assets/vendors/jQuery/jquery.js"></script>
  <script src="assets/vendors/animejs/anime.umd.min.js"></script>
  <script type="module" src="mainScript.js"></script>
  <!-- <title>‎</title> -->
  <title>New Tab</title>
</head>

<body>
  <div class="position-fixed overflow-hidden top-0 start-0 z-n1 w-100 vh-100 circles">
    <div class="w-100 z-1 loader"></div>
    <div class="circle circle1 circle-subtle" data-speed="fast"></div>
    <div class="circle circle2 circle-subtle" data-speed="normal"></div>
    <div class="circle circle3 circle-subtle" data-speed="slow"></div>
  </div>

  <div class="d-flex px-4 py-3 position-fixed top-0 start-0 w-100 justify-content-between align-items-center header-bar" style="z-index: 10">
    <div class="d-flex gap-3 align-items-center greeting-container">
      <img src="assets/images/mainLogo.png" alt="Logo" class="header-logo" />
      <h1 id="greeting" class="d-none d-md-block mb-0 text-white" style="font-family: &quot;Outfit&quot;, sans-serif">Good afternoon</h1>
    </div>

    <div class="text-end clock-container">
      <div id="date" class="text-white-50 fs-6" style="font-family: &quot;Outfit&quot;, sans-serif">Wednesday, June 17</div>
      <div id="clock" class="text-white fs-4" style="font-family: &quot;Outfit&quot;, sans-serif">12:00 PM</div>
    </div>
    <div id="analogClock" class="position-absolute below-time analog-clock liquid-glass">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand minute-hand"></div>
        <div class="hand second-hand"></div>
        <div class="clock-center"></div>
      </div>
    </div>
  </div>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="w-100 position-relative search-wrapper" style="max-width: 600px">
      <div class="d-flex gap-3 mb-4 justify-content-center shortcuts-container">
        <div class="position-relative shortcut-dropdown-wrapper">
          <a href="https://mail.google.com" class="d-flex align-items-center justify-content-center text-decoration-none text-white shortcut-item liquid-glass no-tilt lg-depth-1" title="Gmail">
            <i class="bi bi-envelope-at"></i>
          </a>
          <div class="p-2 position-absolute shortcut-dropdown liquid-glass no-tilt lg-depth-2">
            <a href="https://mail.google.com/mail/u/0/#inbox" class="d-flex gap-2 align-items-center text-white text-decoration-none shortcut-dropdown-item">
              <i class="bi bi-link-45deg"></i>
              <span>Personal Account</span>
            </a>
            <a href="https://mail.google.com/mail/u/1/#inbox" class="d-flex gap-2 align-items-center text-white text-decoration-none shortcut-dropdown-item">
              <i class="bi bi-link-45deg"></i>
              <span>Secondary Account</span>
            </a>
            <a href="https://mail.google.com/mail/u/3/#inbox" class="d-flex gap-2 align-items-center text-white text-decoration-none shortcut-dropdown-item">
              <i class="bi bi-link-45deg"></i>
              <span>Cvsu Account</span>
            </a>
            <a href="https://mail.google.com/mail/u/4/#inbox" class="d-flex gap-2 align-items-center text-white text-decoration-none shortcut-dropdown-item">
              <i class="bi bi-link-45deg"></i>
              <span>Dump Account</span>
            </a>
            <a href="https://mail.google.com/mail/u/2/#inbox" class="d-flex gap-2 align-items-center text-white text-decoration-none shortcut-dropdown-item">
              <i class="bi bi-link-45deg"></i>
              <span>Gmail Account 3</span>
            </a>
          </div>
        </div>
        <a href="https://github.com" class="d-flex align-items-center justify-content-center text-decoration-none text-white shortcut-item liquid-glass no-tilt lg-depth-1" title="GitHub">
          <i class="bi bi-github"></i>
        </a>
        <a href="https://youtube.com" class="d-flex align-items-center justify-content-center text-decoration-none text-white shortcut-item liquid-glass no-tilt lg-depth-1" title="YouTube">
          <i class="text-danger bi bi-youtube"></i>
        </a>
        <a href="https://yts.gg/home" class="d-flex align-items-center justify-content-center text-decoration-none text-white shortcut-item liquid-glass no-tilt lg-depth-1" title="YTS">
          <img src="assets/images/shortcuts/yts_x32.png" alt="YTS" class="shortcut-img" />
        </a>
        <a href="https://tbcpl.lol/" class="d-flex align-items-center justify-content-center text-decoration-none text-white shortcut-item liquid-glass no-tilt lg-depth-1" title="TBP CL">
          <img src="assets/images/shortcuts/tbcp.png" alt="TBP CL" class="shortcut-img" />
        </a>
      </div>

      <form id="searchForm" action="https://www.google.com/search" method="get">
        <div class="d-flex p-2 align-items-center shadow-none liquid-glass lg-depth-2 search-box">
          <div class="me-1">
            <div class="d-flex gap-2 p-2 text-white align-items-center border-0" id="engineSelector" style="cursor: default; user-select: none">
              <i id="current-engine-icon" class="bi bi-google"></i>
            </div>
          </div>
          <ul class="d-none" id="engineDropdownList">
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option active"
                href="#"
                data-engine="google"
                data-action="https://www.google.com/search"
                data-placeholder="Search Google..."
              >
                <i class="bi bi-google"></i> Google
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="bing"
                data-action="https://www.bing.com/search"
                data-placeholder="Search Bing..."
              >
                <i class="bi bi-microsoft"></i> Bing
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="duckduckgo"
                data-action="https://duckduckgo.com/"
                data-placeholder="Search DuckDuckGo..."
              >
                <i class="bi bi-shield-shaded"></i> DuckDuckGo
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="youtube"
                data-action="https://www.youtube.com/results"
                data-placeholder="What would you like to watch?"
              >
                <i class="bi bi-youtube"></i> YouTube
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="chatgpt"
                data-action="https://chatgpt.com/?q="
                data-placeholder="Ask ChatGPT anything..."
              >
                <i class="bi-chat-dots"></i> ChatGPT
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="grok"
                data-action="https://grok.com/"
                data-placeholder="Ask Grok anything..."
              >
                <i class="bi-chat-dots"></i> Grok
              </a>
            </li>
            <li>
              <a
                class="d-flex gap-3 py-2 dropdown-item align-items-center text-white engine-option"
                href="#"
                data-engine="claude"
                data-action="https://claude.ai/new?q="
                data-placeholder="Ask Claude anything..."
              >
                <i class="bi-chat-dots"></i> Claude
              </a>
            </li>
          </ul>
          <input
            type="text"
            name="q"
            id="searchInput"
            class="flex-grow-1 px-2 py-1 border-0 bg-transparent text-white shadow-none search-input"
            placeholder="Search Google..."
            autocomplete="off"
            style="font-family: &quot;Outfit&quot;, sans-serif; outline: none; font-size: 1.15rem"
          />
          <div class="d-flex gap-1 align-items-center">
            <button type="button" id="clearBtn" class="d-none p-2 btn btn-link text-white-50 border-0 shadow-none" aria-label="Clear">
              <i class="bi bi-x-lg"></i>
            </button>
            <button type="submit" id="searchSubmitBtn" class="p-2 btn btn-link text-white border-0 shadow-none" aria-label="Search">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </form>

      <div id="suggestionsBox" class="d-none mt-2 p-1 w-100 position-absolute start-0 text-start suggestions-box liquid-glass lg-depth-3"></div>
    </div>
  </div>
  <div class="px-4 py-3 position-fixed bottom-0 start-0 quote-container" style="z-index: 10">
    <p id="quoteText" class="mb-0" style="display: none"></p>
  </div>
  <div id="nowPlayingBar" class="px-4 py-3 pt-2 position-fixed bottom-0 end-0 now-playing-bar" style="z-index: 10">
    <div id="nowPlayingLyrics" class="now-playing-lyrics liquid-glass lg-depth-1"></div>
    <div id="nowPlayingControls" class="now-playing-controls liquid-glass lg-depth-1">
      <button id="musicPlayPauseBtn" class="control-btn" title="Play/Pause">
        <i class="bi bi-pause-fill"></i>
      </button>
      <button id="musicNextBtn" class="control-btn" title="Next">
        <i class="bi bi-skip-forward-fill"></i>
      </button>
    </div>

    <div class="d-flex gap-2 align-items-center now-playing-content">
      <div class="now-playing-icon">
        <i class="bi bi-music-note-beamed"></i>
        <span class="now-playing-bars"> <span></span><span></span><span></span> </span>
      </div>
      <div class="d-none d-lg-block now-playing-text" id="nowPlayingText">
        <div id="nowPlayingTitle" class="now-playing-title">Idle</div>
        <div id="nowPlayingArtist" class="now-playing-artist">No song playing</div>
      </div>
    </div>
  </div>
</body>
